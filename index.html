<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY FITNESS - テスト</title>
<style>
body { font-family: Arial, sans-serif; background: #f7f7f7; color: #111; margin: 0; padding: 20px; }
.container { max-width: 460px; margin: 0 auto; }
h1 { color: #111; font-size: 24px; }
p { color: #666; }
.status { background: #e8f4fd; padding: 15px; border-radius: 8px; margin: 10px 0; }
</style>
</head>
<body>
<div class="container">
<h1>MY FITNESS</h1>
<p>アプリは読み込み中です...</p>
<div class="status">

</div>
<div id="app" style="margin-top: 20px; padding: 20px; background: white; border-radius: 8px; border: 1px solid #ddd;"></div>
</div>

<script>
document.getElementById('app').innerHTML = '<p>✓ JavaScript が実行されました!</p><p>アプリの読み込みを開始します...</p>';

// 完全なアプリコードはここに入ります
setTimeout(() => {
  document.getElementById('app').innerHTML += '<p>アプリデータを初期化中...</p>';
}, 500);
</script>

</html>
